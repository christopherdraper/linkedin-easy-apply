[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (unused imports, undefined names, etc.)
    "B",    # flake8-bugbear (common bug patterns)
    "C90",  # mccabe complexity
    "I",    # isort (import ordering)
]
ignore = [
    "E501",  # line too long — handled by formatter, not a hard error
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.bandit]
skips = []
