[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [".cache"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (unused imports, undefined names, etc.)
    "B",    # flake8-bugbear (common bug patterns)
    "C90",  # mccabe complexity
    "I",    # isort (import ordering)
]
ignore = [
    "E501",  # line too long — handled by formatter, not a hard error
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.per-file-ignores]
"job_search_apply.py" = ["F401", "E402"]
"assisted_apply_mcp.py" = ["F401", "E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.bandit]
skips = ["B110", "B112", "B310", "B311", "B404", "B603", "B607"]  # B110/B112: try/except/pass intentional; B310: urlopen on hardcoded API URLs; B311: random for timing jitter, not crypto; B404/B603/B607: Xvfb subprocess launch with hardcoded args
exclude_dirs = ["tests"]

[tool.coverage.run]
omit = ["tests/*"]

[tool.coverage.report]
# True source coverage (tests/ omitted). Actual: 51.9% after test Wave 2.
# RATCHET: raise as new tests land. Never lower.
# Gate sits ~2pts under actual so unrelated small changes don't flake CI.
fail_under = 50
precision = 1
show_missing = true
