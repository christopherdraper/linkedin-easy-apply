repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff          # lint and auto-fix
        args: [--fix]
      - id: ruff-format   # format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        files: \.py$

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args: ["job_search_apply.py", "--min-confidence", "80"]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
