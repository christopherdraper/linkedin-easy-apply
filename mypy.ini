# mypy configuration (kept out of pyproject.toml on purpose).
# Non-strict baseline: the bar is zero errors on the scoped files,
# not full annotation coverage. Do not add disallow_untyped_defs yet.
#
# Scope: the modular code (jobapply/, ats_handlers/, dashboard.py, batch_analysis.py).
# Excluded on purpose:
#   - job_search_apply.py: facade re-export noise (ignore_errors override below,
#     since scoped modules import through it)
#   - assisted_apply_mcp.py and q2apply/: being restructured concurrently.
#     TODO: add q2apply/ to the files list after the restructure lands.
#   - tests/: not type-checked

[mypy]
python_version = 3.11
files = jobapply, ats_handlers, dashboard.py, batch_analysis.py
ignore_missing_imports = True

# Facade re-exports get pulled in via follow_imports; don't report on them.
[mypy-job_search_apply]
ignore_errors = True
