version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-tools:
        patterns:
          - "ruff"
          - "pylint"
          - "radon"
          - "bandit"
          - "vulture"
          - "pre-commit"
          - "pytest*"
          - "pip-audit"
