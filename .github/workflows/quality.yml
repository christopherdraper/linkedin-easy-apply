name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r dev-requirements.txt

      - name: Radon cyclomatic complexity
        run: |
          echo "## Complexity Grades (C or worse = needs attention)"
          radon cc jobapply/ assisted_apply_mcp.py batch_analysis.py dashboard.py ats_handlers/ job_search_apply.py -s -n C --total-average
          echo ""
          echo "## Maintainability Index"
          radon mi jobapply/ assisted_apply_mcp.py batch_analysis.py dashboard.py ats_handlers/ job_search_apply.py -s

      - name: Radon complexity gate
        run: |
          # Fail if F-count (unmaintainable functions) grows across ALL source modules.
          # RATCHET: 3 F-grade functions as of 2026-07:
          #   _navigate_external_form (134), _find_navigation_button (48)
          #   in jobapply/external.py, batch_analysis._fingerprint_failure (41)
          # Lower this limit as refactors land. NEVER raise it.
          F_COUNT=$(radon cc jobapply/ assisted_apply_mcp.py batch_analysis.py dashboard.py ats_handlers/ job_search_apply.py -s -n F --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          total = sum(len(v) for v in data.values())
          print(total)
          ")
          echo "Functions with F complexity: $F_COUNT"
          if [ "$F_COUNT" -gt 3 ]; then
            echo "::error::Too many F-complexity functions ($F_COUNT > 3). Refactor before merging."
            exit 1
          fi

      - name: Pylint score and gate
        run: |
          pylint jobapply/ assisted_apply_mcp.py batch_analysis.py dashboard.py ats_handlers/ job_search_apply.py \
            --disable=C0114,C0115,C0116,C0301,C0302,W0603,W0718,R0902,R0911,R0912,R0913,R0914,R0915,R0917,E0401,W0511 \
            --max-line-length=100 \
            --exit-zero | tee pylint-report.txt
          SCORE=$(grep -oP '[\d.]+(?=/10)' pylint-report.txt | head -1)
          echo "Pylint score: $SCORE/10"
          python3 -c "import sys; sys.exit(0 if float('$SCORE') >= 9.0 else 1)" || {
            echo "::error::Pylint score $SCORE is below 9.0 threshold"
            exit 1
          }

      - name: Code metrics summary
        run: |
          echo "## Raw Metrics"
          radon raw jobapply/ assisted_apply_mcp.py batch_analysis.py dashboard.py job_search_apply.py -s
          echo ""
          echo "## Halstead Metrics (top 10 most complex)"
          radon hal jobapply/ -s 2>/dev/null | head -40 || true
