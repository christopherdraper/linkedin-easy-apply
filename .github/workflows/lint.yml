name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dev-requirements.txt

      - name: Install pre-commit
        run: pip install -r dev-requirements.txt

      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # Runs the exact same hook versions as local development
      # (linter versions are pinned once, in .pre-commit-config.yaml).
      # pytest is skipped here because test.yml owns it (with coverage).
      - name: Run pre-commit on all files
        run: SKIP=pytest pre-commit run --all-files --show-diff-on-failure
